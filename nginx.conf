server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    proxy_http_version 1.1;

    location /images/ {
        expires 5s;
        root /usr/share/nginx/html;
        try_files $uri /images/placeholder.jpg;
    }

    location /api/catalogue/ {
        proxy_pass http://catalogue.catalogue.svc.cluster.local:8080/;
    }

    # location /api/user/ {
    #     proxy_pass http://user.user.svc.cluster.local:8080/;
    # }

    # location /api/cart/ {
    #     proxy_pass http://cart.cart.svc.cluster.local:8080/;
    # }

    # location /api/shipping/ {
    #     proxy_pass http://shipping.shipping.svc.cluster.local:8080/;
    # }

    # location /api/payment/ {
    #     proxy_pass http://payment.payment.svc.cluster.local:8080/;
    # }

    location /health {
        stub_status on;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}